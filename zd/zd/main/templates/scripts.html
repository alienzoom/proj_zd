
<script defer>
    function getCSRFToken() {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, 'csrftoken'.length + 1) === ('csrftoken' + '=')) {
                cookieValue = decodeURIComponent(cookie.substring('csrftoken'.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
    document.addEventListener('DOMContentLoaded', function() {
        // AJAX обработка форм
        const loginForm = document.getElementById('login-form');
        const registrationForm = document.getElementById('registration-form');
        
        function submitForm(form, actionType) {
            const formData = new FormData(form);
            formData.append('action', actionType);
            
            const submitButton = form.querySelector('input[type="submit"]');
            const originalText = submitButton.value;
            
            submitButton.value = actionType === 'login' ? 'Вход...' : 'Регистрация...';
            submitButton.disabled = true;
            
            // Удаляем старые ошибки
            const errorElements = form.querySelectorAll('.error');
            errorElements.forEach(el => el.remove());

            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',
                    'X-CSRFToken': getCSRFToken(),   // ← Добавить эту строку
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    const message = actionType === 'login' ? 'Вход выполнен успешно!' : 'Регистрация прошла успешно!';
                    showNotification(message, 'success');
                    setTimeout(() => {
                        window.location.href = data.redirect_url;
                    }, 1000);
                } else {
                    if (data.errors) {
                        Object.keys(data.errors).forEach(fieldName => {
                            if (fieldName === 'general') {
                                showNotification(data.errors[fieldName][0].message, 'error');
                            } else {
                                const field = form.querySelector(`[name="${fieldName}"]`);
                                if (field) {
                                    const errorDiv = document.createElement('div');
                                    errorDiv.className = 'error';
                                    errorDiv.textContent = data.errors[fieldName][0].message;
                                    field.parentNode.insertBefore(errorDiv, field.nextSibling);
                                }
                            }
                        });
                    }
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showNotification('Произошла ошибка при отправке формы', 'error');
            })
            .finally(() => {
                submitButton.value = originalText;
                submitButton.disabled = false;
            });
        }
        
        if (loginForm) {
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                submitForm(this, 'login');
            });
        }
        
        if (registrationForm) {
            registrationForm.addEventListener('submit', function(e) {
                e.preventDefault();
                submitForm(this, 'register');
            });
        }
        
        function showNotification(message, type) {
            const oldNotifications = document.querySelectorAll('.notification');
            oldNotifications.forEach(notification => notification.remove());
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                border-radius: 5px;
                color: white;
                font-weight: bold;
                z-index: 10000;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                animation: slideIn 0.3s ease-out;
            `;
            
            if (type === 'success') {
                notification.style.backgroundColor = '#4CAF50';
                notification.style.backgroundColor = '#f44336';
            }
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-in';
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 300);
            }, 5000);
        }
        
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
            .error {
                color: #f44336;
                font-size: 14px;
                margin-top: 5px;
            }
        `;
        document.head.appendChild(style);
    });
</script>
